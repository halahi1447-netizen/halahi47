<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hala Hi – Live Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--deep:#2E2451;--purple:#4B3F72;--mid:#8B82B9;--gold:#F4B740;--gold-light:#FFD36A;--white:#FFFFFF;--bg:#F5F6FA;--muted:#6E6E7E;--card-bg:#FFFFFF;--card-shadow:0 4px 24px rgba(46,36,81,.09);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--deep);min-height:100vh;overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 4rem;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(75,63,114,.09)}
    .nav-logo img{height:52px;width:auto;object-fit:contain;mix-blend-mode:multiply}
    .nav-right{display:flex;align-items:center;gap:1.2rem}
    .nav-member{display:flex;align-items:center;gap:.6rem;font-size:.88rem;font-weight:500;color:var(--purple)}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--mid));display:flex;align-items:center;justify-content:center;color:white;font-size:.82rem;font-weight:700}
    .nav-back{font-size:.85rem;color:var(--purple);text-decoration:none;font-weight:600;padding:.5rem 1.1rem;border-radius:50px;border:2px solid rgba(75,63,114,.2);transition:border-color .2s,color .2s,background .2s}
    .nav-back:hover{border-color:var(--purple);background:rgba(75,63,114,.06);color:var(--deep)}
    .page{padding:5.5rem 3rem 4rem;max-width:1000px;margin:0 auto}
    .hero{background:linear-gradient(145deg,#2E2451 0%,#4B3F72 55%,#3a2f60 100%);border-radius:28px;padding:2.5rem 3rem;position:relative;overflow:hidden;margin-bottom:2rem;animation:fadeUp .5s ease both}
    .hero-blob{position:absolute;border-radius:50%;opacity:.12;filter:blur(50px);pointer-events:none}
    .hb1{width:280px;height:280px;background:var(--gold);top:-80px;right:-60px}
    .hb2{width:180px;height:180px;background:var(--mid);bottom:-50px;left:10px}
    .hero-inner{position:relative;z-index:1}
    .hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(244,183,64,.18);border:1px solid rgba(244,183,64,.35);color:var(--gold-light);font-size:.78rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;padding:.35rem 1.1rem;border-radius:50px;margin-bottom:.8rem}
    .live-pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
    .hero h1{font-family:"Playfair Display",serif;font-size:clamp(1.6rem,3vw,2.3rem);font-weight:900;color:white;margin-bottom:.5rem;line-height:1.2}
    .hero h1 span{color:var(--gold-light);font-style:italic}
    .hero-sub{font-size:.95rem;color:rgba(255,255,255,.75);line-height:1.7}
    .prep-box{background:var(--card-bg);border-radius:24px;padding:2rem 2.4rem;border:1px solid rgba(75,63,114,.08);margin-bottom:2rem;animation:fadeUp .5s ease .1s both;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:var(--card-shadow)}
    .prep-steps{display:flex;gap:2.5rem;justify-content:center;margin-bottom:1.8rem;flex-wrap:wrap}
    .prep-step{display:flex;flex-direction:column;align-items:center;gap:.5rem}
    .prep-icon{font-size:2.2rem;animation:floatIcon 3s ease-in-out infinite}
    @keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    .prep-text{font-size:.84rem;font-weight:500;color:var(--purple)}
    .zoom-btn{display:inline-flex;align-items:center;gap:.7rem;background:var(--gold);color:var(--deep);font-weight:700;font-size:1rem;font-family:"DM Sans",sans-serif;padding:.85rem 2.4rem;border-radius:50px;text-decoration:none;box-shadow:0 6px 24px rgba(244,183,64,.4);transition:transform .25s,box-shadow .25s;margin-bottom:.8rem}
    .zoom-btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(244,183,64,.55)}
    .zoom-tagline{font-size:.85rem;color:var(--muted);font-style:italic}
    .section-title{font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:700;color:var(--deep);margin-bottom:1.2rem}
    .schedule-wrap{animation:fadeUp .5s ease .2s both}
    .schedule-grid{display:flex;flex-direction:column;gap:.8rem}
    .day-card{background:var(--card-bg);border-radius:20px;border:1px solid rgba(75,63,114,.08);overflow:hidden;transition:transform .25s,box-shadow .25s;box-shadow:var(--card-shadow)}
    .day-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(46,36,81,.13)}
    .day-card.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(244,183,64,.25),var(--card-shadow)}
    .day-header{display:flex;align-items:center;gap:1rem;padding:1.2rem 1.6rem;cursor:pointer;user-select:none}
    .day-name{font-weight:700;font-size:.95rem;color:var(--deep);min-width:110px}
    .today-badge{display:inline-block;background:var(--gold);color:var(--deep);font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.18rem .7rem;border-radius:50px;margin-left:.5rem;box-shadow:0 2px 8px rgba(244,183,64,.35)}
    .day-time{font-size:.82rem;color:var(--muted);flex:1}
    .day-status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600}
    .status-live{color:#ef4444}
    .status-live::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,.25);animation:pulse 1.2s ease-in-out infinite;margin-right:.3rem}
    .status-upcoming{color:var(--mid)}
    .day-arrow{color:var(--muted);font-size:.75rem;transition:transform .25s;margin-left:1rem}
    .day-card.open .day-arrow{transform:rotate(180deg)}
    .day-body{display:none;border-top:1px solid rgba(75,63,114,.07);padding:1.3rem 1.6rem}
    .day-card.open .day-body{display:block}
    .session-block{display:flex;align-items:center;gap:1.2rem;background:var(--bg);border-radius:16px;padding:1.1rem 1.4rem;border:1px solid rgba(75,63,114,.06)}
    .session-time-range{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:700;color:var(--deep)}
    .session-divider{width:1px;height:36px;background:rgba(75,63,114,.12);flex-shrink:0}
    .session-details{flex:1}
    .session-title{font-size:.9rem;font-weight:600;color:var(--deep);margin-bottom:.2rem}
    .session-note{font-size:.78rem;color:var(--muted)}
    .session-join{display:inline-flex;align-items:center;gap:.4rem;background:var(--gold);color:var(--deep);font-size:.8rem;font-weight:700;padding:.45rem 1.1rem;border-radius:50px;text-decoration:none;transition:all .25s;white-space:nowrap;box-shadow:0 4px 12px rgba(244,183,64,.35)}
    .session-join:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(244,183,64,.5)}
    .session-join-soon{display:inline-flex;align-items:center;background:rgba(75,63,114,.08);color:var(--mid);font-size:.78rem;font-weight:600;padding:.45rem 1.1rem;border-radius:50px;white-space:nowrap}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:700px){nav{padding:.6rem 1.2rem}.page{padding:5rem 1.2rem 3rem}.hero{padding:1.8rem 1.4rem}.prep-steps{gap:1.2rem}.session-block{flex-wrap:wrap}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Hala Hi</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-orb orb1"></div>
    <div class="hero-orb orb2"></div>
    <div class="hero-inner">
      <div class="hero-text">
        <div class="hero-pill">📅 Schedule</div>
        <h1 class="hero-title">Weekly<br>Live Sessions</h1>
        <p class="hero-sub">Join your teacher and fellow members on Zoom for live speaking practice.</p>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="hero-session-count">—</div>
        <div class="hero-stat-label">Sessions<br>this week</div>
      </div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="today-card no-session" id="today-card">
    <div class="today-orb"></div>
    <div class="today-left">
      <div class="today-eyebrow">Today's Session</div>
      <div class="today-title" id="today-title">Loading...</div>
      <div class="today-time" id="today-time"></div>
    </div>
    <a class="today-btn off" id="today-btn" href="#" target="_blank">🎥 Join Now</a>
  </div>

  <!-- WEEK -->
  <p class="section-label">This Week</p>
  <div id="week-container">
    <div class="loading-wrap"><div class="spinner"></div><p>Loading schedule...</p></div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyASlKXegbN0k37A89HQP96pNVJPNoF6qbk",
    authDomain: "halahi47-52b2d.firebaseapp.com",
    projectId: "halahi47-52b2d",
    storageBucket: "halahi47-52b2d.firebasestorage.app",
    messagingSenderId: "607706363591",
    appId: "1:607706363591:web:e6c9efd674ca89a22df0e2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = new Date();
  const todayName = DAYS[today.getDay()];

  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function fmtRange(start, end) {
    if (!start) return '';
    return end ? `${fmt12(start)} – ${fmt12(end)}` : fmt12(start);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    await loadSchedule();
  });

  async function loadSchedule() {
    try {
      const [scheduleSnap, zoomSnap] = await Promise.all([
        getDocs(collection(db, 'schedule')),
        getDoc(doc(db, 'settings', 'zoom'))
      ]);

      const sessions = scheduleSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const zoomLink = zoomSnap.exists() ? zoomSnap.data().link : null;
      sessions.sort((a, b) => DAYS.indexOf(a.day) - DAYS.indexOf(b.day));

      // hero stat
      document.getElementById('hero-session-count').textContent = sessions.length;

      // today
      const todaySession = sessions.find(s => s.day === todayName);
      const todayCard = document.getElementById('today-card');
      const todayTitle = document.getElementById('today-title');
      const todayTime = document.getElementById('today-time');
      const todayBtn = document.getElementById('today-btn');

      if (todaySession) {
        todayCard.classList.remove('no-session');
        todayCard.classList.add('has-session');
        todayTitle.textContent = todaySession.topic;
        todayTime.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${fmtRange(todaySession.time, todaySession.timeEnd)}`;
        if (zoomLink) {
          todayBtn.href = zoomLink;
          todayBtn.classList.remove('off');
        }
      } else {
        todayTitle.textContent = 'No session today';
        todayTime.textContent = 'Enjoy your day off 🌟';
        todayBtn.textContent = 'No session';
      }

      // week grid
      const container = document.getElementById('week-container');
      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>No sessions scheduled yet. Check back soon!</p></div>';
        return;
      }

      const weekDays = DAYS.map((name, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() - today.getDay() + i);
        return { name, date: d, session: sessions.find(s => s.day === name) || null };
      });

      container.innerHTML = '<div class="week-grid">' + weekDays.map(wd => {
        const isToday = wd.name === todayName;
        const isPast = wd.date.toDateString() !== today.toDateString() && wd.date < today;
        const dateNum = wd.date.getDate();
        const dow = wd.name.substring(0, 3).toUpperCase();

        let cls = 'day-card';
        if (isToday) cls += ' is-today';
        else if (isPast) cls += ' is-past';
        if (!wd.session) cls += ' is-empty';

        let pillHtml = '';
        if (isToday && wd.session) pillHtml = '<span class="status-pill pill-today">Today</span>';
        else if (!isPast && wd.session) pillHtml = '<span class="status-pill pill-upcoming">Upcoming</span>';
        else if (isPast && wd.session) pillHtml = '<span class="status-pill pill-past">Past</span>';

        const joinHtml = isToday && wd.session && zoomLink
          ? `<a class="join-btn" href="${zoomLink}" target="_blank">🎥 Join</a>` : '';

        const sessionHtml = wd.session
          ? `<div class="session-topic">${wd.session.topic}</div>
             <div class="session-time">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
               ${fmtRange(wd.session.time, wd.session.timeEnd)}
             </div>`
          : `<div class="no-session-text">No session</div>`;

        return `
          <div class="${cls}">
            <div class="date-pill">
              <div class="date-dow">${dow}</div>
              <div class="date-num">${dateNum}</div>
            </div>
            <div class="session-info">${sessionHtml}</div>
            <div class="day-right">${pillHtml}${joinHtml}</div>
          </div>`;
      }).join('') + '</div>';

    } catch(e) {
      console.error(e);
      document.getElementById('week-container').innerHTML = '<div class="empty-state"><div class="empty-icon">😔</div><p>Could not load schedule.</p></div>';
    }
  }
</script>

</body>
</html>
