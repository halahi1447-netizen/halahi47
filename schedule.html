<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hala Hi – Live Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --deep:#2E2451;--purple:#4B3F72;--mid:#8B82B9;
      --gold:#F4B740;--gold-light:#FFD36A;--bg:#F0F1F8;--muted:#6E6E7E;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--deep);min-height:100vh;overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.65rem clamp(1.2rem,4vw,3rem);background:rgba(255,255,255,.93);backdrop-filter:blur(18px);border-bottom:1px solid rgba(75,63,114,.09)}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--deep);text-decoration:none}
    .nav-back{font-size:.82rem;color:var(--purple);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:.35rem;transition:color .2s}
    .nav-back:hover{color:var(--deep)}

    .page{padding:5rem clamp(1rem,4vw,2.5rem) 4rem;max-width:780px;margin:0 auto}

    /* HERO */
    .hero{background:linear-gradient(140deg,var(--deep) 0%,#3d3270 60%,var(--purple) 100%);border-radius:32px;padding:clamp(1.8rem,4vw,2.8rem) clamp(1.5rem,4vw,2.8rem);margin-bottom:1.8rem;position:relative;overflow:hidden;animation:fadeUp .5s ease both}
    .hero-orb{position:absolute;border-radius:50%;filter:blur(55px);pointer-events:none}
    .orb1{width:280px;height:280px;background:var(--gold);opacity:.1;top:-80px;right:-60px}
    .orb2{width:180px;height:180px;background:var(--mid);opacity:.15;bottom:-50px;left:-30px}
    .hero-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
    .hero-text{}
    .hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(244,183,64,.18);border:1px solid rgba(244,183,64,.3);color:var(--gold-light);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:.25rem .85rem;border-radius:50px;margin-bottom:.8rem}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:900;color:white;line-height:1.15;margin-bottom:.5rem}
    .hero-sub{font-size:clamp(.82rem,2vw,.9rem);color:rgba(255,255,255,.6);line-height:1.65;max-width:380px}
    .hero-stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:1rem 1.4rem;text-align:center;flex-shrink:0}
    .hero-stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold-light);line-height:1}
    .hero-stat-label{font-size:.68rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.09em;margin-top:.3rem}

    /* TODAY CARD */
    .today-card{border-radius:24px;padding:clamp(1.2rem,3vw,1.8rem) clamp(1.2rem,3vw,2rem);margin-bottom:1.6rem;display:flex;align-items:center;justify-content:space-between;gap:1.2rem;flex-wrap:wrap;animation:fadeUp .5s ease .08s both;position:relative;overflow:hidden}
    .today-card.has-session{background:linear-gradient(135deg,#1a1040,var(--deep));box-shadow:0 12px 40px rgba(46,36,81,.25)}
    .today-card.no-session{background:white;border:1.5px solid rgba(75,63,114,.1)}
    .today-orb{position:absolute;width:200px;height:200px;border-radius:50%;background:var(--gold);opacity:.07;filter:blur(40px);top:-60px;right:-40px;pointer-events:none}
    .today-left{position:relative;z-index:1}
    .today-eyebrow{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:.5rem}
    .today-card.has-session .today-eyebrow{color:rgba(255,255,255,.45)}
    .today-card.no-session .today-eyebrow{color:var(--muted)}
    .today-live{display:inline-flex;align-items:center;gap:.45rem;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:.22rem .75rem;border-radius:50px;margin-bottom:.6rem}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
    .today-title{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3vw,1.5rem);font-weight:900;margin-bottom:.3rem}
    .today-card.has-session .today-title{color:white}
    .today-card.no-session .today-title{color:var(--deep)}
    .today-time{font-size:.85rem;display:flex;align-items:center;gap:.4rem}
    .today-card.has-session .today-time{color:rgba(255,255,255,.6)}
    .today-card.no-session .today-time{color:var(--muted)}
    .today-btn{position:relative;z-index:1;display:inline-flex;align-items:center;gap:.55rem;background:var(--gold);color:var(--deep);font-weight:700;font-size:.9rem;padding:.75rem 1.8rem;border-radius:50px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(244,183,64,.4);flex-shrink:0;white-space:nowrap}
    .today-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,183,64,.55)}
    .today-btn.off{background:rgba(75,63,114,.1);color:var(--muted);pointer-events:none;box-shadow:none}

    /* WEEK */
    .section-label{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--deep);margin-bottom:1rem;animation:fadeUp .5s ease .14s both}
    .week-grid{display:flex;flex-direction:column;gap:.7rem;animation:fadeUp .5s ease .18s both}

    .day-card{background:white;border-radius:20px;padding:clamp(.9rem,2vw,1.2rem) clamp(1rem,2.5vw,1.5rem);border:1.5px solid rgba(75,63,114,.07);display:flex;align-items:center;gap:clamp(.8rem,2vw,1.3rem);transition:transform .25s,box-shadow .25s,border-color .25s}
    .day-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(46,36,81,.09)}
    .day-card.is-today{border-color:var(--gold);background:linear-gradient(135deg,rgba(244,183,64,.05),white);box-shadow:0 4px 20px rgba(244,183,64,.15)}
    .day-card.is-past{opacity:.55}
    .day-card.is-empty{opacity:.4}

    /* date pill */
    .date-pill{width:clamp(48px,8vw,58px);height:clamp(58px,9vw,68px);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:rgba(75,63,114,.07);transition:background .25s}
    .day-card.is-today .date-pill{background:var(--gold)}
    .date-dow{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--muted);line-height:1}
    .day-card.is-today .date-dow{color:var(--deep)}
    .date-num{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--deep);line-height:1.1;margin-top:.15rem}

    /* session info */
    .session-info{flex:1;min-width:0}
    .session-topic{font-size:clamp(.88rem,2vw,.97rem);font-weight:600;color:var(--deep);margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .session-time{font-size:clamp(.75rem,1.8vw,.82rem);color:var(--muted);display:flex;align-items:center;gap:.35rem}
    .session-time svg{width:13px;height:13px;flex-shrink:0;opacity:.6}
    .no-session-text{font-size:.85rem;color:var(--muted);font-style:italic}

    /* right side */
    .day-right{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
    .status-pill{font-size:.65rem;font-weight:700;padding:.2rem .65rem;border-radius:50px;white-space:nowrap}
    .pill-today{background:rgba(244,183,64,.2);color:#b7770d}
    .pill-upcoming{background:rgba(75,63,114,.1);color:var(--purple)}
    .pill-past{background:rgba(110,110,126,.1);color:var(--muted)}
    .join-btn{display:inline-flex;align-items:center;gap:.35rem;background:var(--gold);color:var(--deep);font-weight:700;font-size:.75rem;padding:.38rem 1rem;border-radius:50px;text-decoration:none;transition:transform .18s,box-shadow .18s;box-shadow:0 3px 12px rgba(244,183,64,.35);white-space:nowrap}
    .join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(244,183,64,.5)}

    /* empty / loading */
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
    .empty-icon{font-size:3.5rem;margin-bottom:1rem}
    .loading-wrap{text-align:center;padding:3rem;color:var(--muted)}
    .spinner{width:36px;height:36px;border:3px solid rgba(75,63,114,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:500px){
      .today-card{flex-direction:column;align-items:flex-start}
      .hero-stat{display:none}
      .day-right .status-pill{display:none}
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Hala Hi</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-orb orb1"></div>
    <div class="hero-orb orb2"></div>
    <div class="hero-inner">
      <div class="hero-text">
        <div class="hero-pill">📅 Schedule</div>
        <h1 class="hero-title">Weekly<br>Live Sessions</h1>
        <p class="hero-sub">Join your teacher and fellow members on Zoom for live speaking practice.</p>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="hero-session-count">—</div>
        <div class="hero-stat-label">Sessions<br>this week</div>
      </div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="today-card no-session" id="today-card">
    <div class="today-orb"></div>
    <div class="today-left">
      <div class="today-eyebrow">Today's Session</div>
      <div class="today-title" id="today-title">Loading...</div>
      <div class="today-time" id="today-time"></div>
    </div>
    <a class="today-btn off" id="today-btn" href="#" target="_blank">🎥 Join Now</a>
  </div>

  <!-- WEEK -->
  <p class="section-label">This Week</p>
  <div id="week-container">
    <div class="loading-wrap"><div class="spinner"></div><p>Loading schedule...</p></div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyASlKXegbN0k37A89HQP96pNVJPNoF6qbk",
    authDomain: "halahi47-52b2d.firebaseapp.com",
    projectId: "halahi47-52b2d",
    storageBucket: "halahi47-52b2d.firebasestorage.app",
    messagingSenderId: "607706363591",
    appId: "1:607706363591:web:e6c9efd674ca89a22df0e2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = new Date();
  const todayName = DAYS[today.getDay()];

  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function fmtRange(start, end) {
    if (!start) return '';
    return end ? `${fmt12(start)} – ${fmt12(end)}` : fmt12(start);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    await loadSchedule();
  });

  async function loadSchedule() {
    try {
      const [scheduleSnap, zoomSnap] = await Promise.all([
        getDocs(collection(db, 'schedule')),
        getDoc(doc(db, 'settings', 'zoom'))
      ]);

      const sessions = scheduleSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const zoomLink = zoomSnap.exists() ? zoomSnap.data().link : null;
      sessions.sort((a, b) => DAYS.indexOf(a.day) - DAYS.indexOf(b.day));

      // hero stat
      document.getElementById('hero-session-count').textContent = sessions.length;

      // today
      const todaySession = sessions.find(s => s.day === todayName);
      const todayCard = document.getElementById('today-card');
      const todayTitle = document.getElementById('today-title');
      const todayTime = document.getElementById('today-time');
      const todayBtn = document.getElementById('today-btn');

      if (todaySession) {
        todayCard.classList.remove('no-session');
        todayCard.classList.add('has-session');
        todayTitle.textContent = todaySession.topic;
        todayTime.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${fmtRange(todaySession.time, todaySession.timeEnd)}`;
        if (zoomLink) {
          todayBtn.href = zoomLink;
          todayBtn.classList.remove('off');
        }
      } else {
        todayTitle.textContent = 'No session today';
        todayTime.textContent = 'Enjoy your day off 🌟';
        todayBtn.textContent = 'No session';
      }

      // week grid
      const container = document.getElementById('week-container');
      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>No sessions scheduled yet. Check back soon!</p></div>';
        return;
      }

      const weekDays = DAYS.map((name, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() - today.getDay() + i);
        return { name, date: d, session: sessions.find(s => s.day === name) || null };
      });

      container.innerHTML = '<div class="week-grid">' + weekDays.map(wd => {
        const isToday = wd.name === todayName;
        const isPast = wd.date.toDateString() !== today.toDateString() && wd.date < today;
        const dateNum = wd.date.getDate();
        const dow = wd.name.substring(0, 3).toUpperCase();

        let cls = 'day-card';
        if (isToday) cls += ' is-today';
        else if (isPast) cls += ' is-past';
        if (!wd.session) cls += ' is-empty';

        let pillHtml = '';
        if (isToday && wd.session) pillHtml = '<span class="status-pill pill-today">Today</span>';
        else if (!isPast && wd.session) pillHtml = '<span class="status-pill pill-upcoming">Upcoming</span>';
        else if (isPast && wd.session) pillHtml = '<span class="status-pill pill-past">Past</span>';

        const joinHtml = isToday && wd.session && zoomLink
          ? `<a class="join-btn" href="${zoomLink}" target="_blank">🎥 Join</a>` : '';

        const sessionHtml = wd.session
          ? `<div class="session-topic">${wd.session.topic}</div>
             <div class="session-time">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
               ${fmtRange(wd.session.time, wd.session.timeEnd)}
             </div>`
          : `<div class="no-session-text">No session</div>`;

        return `
          <div class="${cls}">
            <div class="date-pill">
              <div class="date-dow">${dow}</div>
              <div class="date-num">${dateNum}</div>
            </div>
            <div class="session-info">${sessionHtml}</div>
            <div class="day-right">${pillHtml}${joinHtml}</div>
          </div>`;
      }).join('') + '</div>';

    } catch(e) {
      console.error(e);
      document.getElementById('week-container').innerHTML = '<div class="empty-state"><div class="empty-icon">😔</div><p>Could not load schedule.</p></div>';
    }
  }
</script>

</body>
</html>
