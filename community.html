<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hala Hi – Discussions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--deep:#2E2451;--purple:#4B3F72;--mid:#8B82B9;--gold:#F4B740;--gold-light:#FFD36A;--bg:#F5F6FA;--muted:#6E6E7E;--card-bg:#FFFFFF;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--deep);min-height:100vh;overflow-x:hidden}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.6rem 3rem;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(75,63,114,.09)}
    .nav-logo img{height:60px;width:auto;object-fit:contain;mix-blend-mode:multiply}
    .nav-right{display:flex;align-items:center;gap:1.2rem}
    .nav-member{display:flex;align-items:center;gap:.6rem;font-size:.88rem;font-weight:500;color:var(--purple)}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--mid));display:flex;align-items:center;justify-content:center;color:white;font-size:.82rem;font-weight:700}
    .nav-back{font-size:.85rem;color:var(--purple);text-decoration:none;font-weight:500;transition:color .2s}
    .nav-back:hover{color:var(--deep)}

    .page{padding:5.5rem 2rem 4rem;max-width:720px;margin:0 auto}

    .hero{background:linear-gradient(135deg,var(--deep),var(--purple));border-radius:28px;padding:2.2rem 2.5rem;margin-bottom:2rem;position:relative;overflow:hidden;animation:fadeUp .5s ease both}
    .hblob{position:absolute;border-radius:50%;opacity:.12;filter:blur(45px);pointer-events:none}
    .hb1{width:220px;height:220px;background:var(--gold);top:-70px;right:-50px}
    .hb2{width:160px;height:160px;background:var(--mid);bottom:-40px;left:-30px}
    .hero-inner{position:relative;z-index:1}
    .hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(244,183,64,.18);border:1px solid rgba(244,183,64,.3);color:var(--gold-light);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:.28rem .9rem;border-radius:50px;margin-bottom:.8rem}
    .hero h1{font-family:"Playfair Display",serif;font-size:clamp(1.5rem,3vw,2.1rem);font-weight:900;color:white;margin-bottom:.4rem}
    .hero h1 span{color:var(--gold-light)}
    .hero-sub{font-size:.88rem;color:rgba(255,255,255,.7);line-height:1.6}

    .weekly-q{background:var(--card-bg);border-radius:20px;border:2px solid var(--gold);padding:1.6rem 1.8rem;margin-bottom:1.8rem;animation:fadeUp .5s ease .1s both;position:relative;overflow:hidden}
    .wq-glow{position:absolute;width:200px;height:200px;background:var(--gold);opacity:.05;border-radius:50%;filter:blur(40px);top:-60px;right:-60px;pointer-events:none}
    .wq-label{display:inline-flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#d4950a;background:rgba(244,183,64,.12);padding:.2rem .7rem;border-radius:50px;margin-bottom:.8rem}
    .wq-label::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
    .wq-text{font-family:"Playfair Display",serif;font-size:1.15rem;font-weight:700;color:var(--deep);line-height:1.5;margin-bottom:1.2rem}
    .wq-meta{font-size:.75rem;color:var(--muted)}

    .reply-box{background:var(--card-bg);border-radius:18px;border:1px solid rgba(75,63,114,.1);padding:1.2rem 1.4rem;margin-bottom:1.8rem;animation:fadeUp .5s ease .15s both}
    .reply-box-top{display:flex;gap:.8rem;align-items:flex-start}
    .reply-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--mid));display:flex;align-items:center;justify-content:center;color:white;font-size:.8rem;font-weight:700;flex-shrink:0}
    .reply-input{flex:1;border:1.5px solid rgba(75,63,114,.15);border-radius:12px;padding:.75rem 1rem;font-size:.9rem;font-family:"DM Sans",sans-serif;color:var(--deep);resize:none;outline:none;transition:border-color .2s;min-height:80px;background:var(--bg)}
    .reply-input:focus{border-color:var(--purple);background:white}
    .reply-input::placeholder{color:rgba(110,110,126,.5)}
    .reply-actions{display:flex;justify-content:flex-end;margin-top:.8rem}
    .btn-reply{background:var(--gold);color:var(--deep);border:none;cursor:pointer;font-weight:700;font-size:.88rem;font-family:"DM Sans",sans-serif;padding:.55rem 1.4rem;border-radius:50px;box-shadow:0 4px 12px rgba(244,183,64,.3);transition:all .2s}
    .btn-reply:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(244,183,64,.45)}
    .btn-reply:disabled{opacity:.4;cursor:not-allowed;transform:none}

    .posts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    .section-title{font-family:"Playfair Display",serif;font-size:1.2rem;font-weight:700;color:var(--deep)}
    .posts-count{font-size:.8rem;color:var(--muted)}
    .posts-list{display:flex;flex-direction:column;gap:1rem;animation:fadeUp .5s ease .2s both}

    .post-card{background:var(--card-bg);border-radius:18px;border:1px solid rgba(75,63,114,.08);padding:1.3rem 1.5rem;transition:box-shadow .3s}
    .post-card:hover{box-shadow:0 6px 20px rgba(46,36,81,.08)}
    .post-card.highlighted{border-color:rgba(244,183,64,.4);background:rgba(244,183,64,.03)}
    .post-header{display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem}
    .post-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:.8rem;font-weight:700;flex-shrink:0}
    .post-meta{flex:1}
    .post-name{font-size:.88rem;font-weight:700;color:var(--deep)}
    .post-time{font-size:.72rem;color:var(--muted)}
    .post-text{font-size:.9rem;color:var(--deep);line-height:1.65;margin-bottom:1rem}

    .reactions-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .reaction-btn{display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border:1.5px solid rgba(75,63,114,.1);border-radius:50px;padding:.3rem .75rem;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--muted);font-family:"DM Sans",sans-serif;transition:all .2s}
    .reaction-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(75,63,114,.06)}
    .reaction-btn.reacted{border-color:var(--gold);background:rgba(244,183,64,.1);color:var(--deep)}
    .reaction-btn .r-emoji{font-size:.9rem}
    .reply-toggle{margin-left:auto;background:none;border:none;cursor:pointer;font-size:.78rem;color:var(--purple);font-family:"DM Sans",sans-serif;font-weight:600;padding:.3rem .5rem;border-radius:8px;transition:background .2s}
    .reply-toggle:hover{background:rgba(75,63,114,.07)}

    .nested-replies{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(75,63,114,.07);display:none;flex-direction:column;gap:.8rem}
    .nested-replies.open{display:flex}
    .nested-reply{display:flex;gap:.6rem;align-items:flex-start}
    .nested-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:.68rem;font-weight:700;flex-shrink:0}
    .nested-body{flex:1;background:var(--bg);border-radius:12px;padding:.65rem .9rem}
    .nested-name{font-size:.78rem;font-weight:700;color:var(--deep);margin-bottom:.2rem}
    .nested-text{font-size:.82rem;color:var(--deep);line-height:1.55}
    .nested-time{font-size:.68rem;color:var(--muted);margin-top:.3rem}
    .nested-reactions{display:flex;gap:.4rem;margin-top:.5rem}
    .nested-r-btn{display:inline-flex;align-items:center;gap:.2rem;background:white;border:1px solid rgba(75,63,114,.1);border-radius:50px;padding:.2rem .55rem;cursor:pointer;font-size:.72rem;font-weight:600;color:var(--muted);font-family:"DM Sans",sans-serif;transition:all .2s}
    .nested-r-btn:hover{border-color:var(--gold);color:var(--deep)}
    .nested-r-btn.reacted{border-color:var(--gold);background:rgba(244,183,64,.1);color:var(--deep)}

    .nested-input-wrap{display:flex;gap:.6rem;align-items:flex-start;margin-top:.8rem}
    .nested-input{flex:1;border:1.5px solid rgba(75,63,114,.12);border-radius:10px;padding:.6rem .9rem;font-size:.82rem;font-family:"DM Sans",sans-serif;color:var(--deep);outline:none;transition:border-color .2s;background:var(--bg)}
    .nested-input:focus{border-color:var(--purple);background:white}
    .nested-input::placeholder{color:rgba(110,110,126,.45)}
    .btn-nested-send{background:var(--purple);color:white;border:none;cursor:pointer;font-size:.78rem;font-weight:700;font-family:"DM Sans",sans-serif;padding:.55rem 1rem;border-radius:50px;transition:all .2s;white-space:nowrap}
    .btn-nested-send:hover{background:var(--deep)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .post-card.new-post{animation:slideDown .35s ease both;border-color:rgba(244,183,64,.35)}

    @media(max-width:600px){
      nav{padding:.6rem 1.2rem}
      .page{padding:5rem 1rem 3rem}
      .hero{padding:1.6rem}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo"><img id="logoImg" src="" alt="Hala Hi"></div>
  <div class="nav-right">
    <div class="nav-member"><div class="nav-avatar" id="navAvatar">?</div><span id="navName">Loading...</span></div>
    <a href="dashboard.html" class="nav-back">← Dashboard</a>
  </div>
</nav>

<div class="page">

  <div class="hero">
    <div class="hblob hb1"></div>
    <div class="hblob hb2"></div>
    <div class="hero-inner">
      <div class="hero-tag">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Community Discussions
      </div>
      <h1>Let's <span>Talk</span> English</h1>
      <p class="hero-sub">Practice, share, and grow together — one conversation at a time.</p>
    </div>
  </div>

  <div class="weekly-q" id="weeklyQuestion">
    <div class="wq-glow"></div>
    <div class="wq-label">
      <span>This Week's Question</span>
    </div>
    <div class="wq-text" id="wqText">Loading this week's question...</div>
    <div class="wq-meta" id="wqMeta"></div>
  </div>

  <div class="reply-box">
    <div class="reply-box-top">
      <div class="reply-avatar" id="replyAvatar">?</div>
      <textarea class="reply-input" id="replyInput" placeholder="Share your answer or thoughts..." rows="3"></textarea>
    </div>
    <div class="reply-actions">
      <button class="btn-reply" id="submitReply" disabled>Post Reply</button>
    </div>
  </div>

  <div class="posts-header">
    <div class="section-title">Replies</div>
    <div class="posts-count" id="postsCount"></div>
  </div>

  <div class="posts-list" id="postsList">
    <div style="text-align:center;padding:2rem;color:var(--muted);font-size:.9rem">Loading replies...</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlHKMpHlFpBkr3NF5Dep0KTYBlFkH3bls",
  authDomain: "halahi47-52b2d.firebaseapp.com",
  projectId: "halahi47-52b2d",
  storageBucket: "halahi47-52b2d.appspot.com",
  messagingSenderId: "831117548171",
  appId: "1:831117548171:web:6d9e0a6be3f0e0e3c4d7b2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentMember = null;
let currentQuestionId = null;

const avatarColors = ['#4B3F72','#8B82B9','#F4B740','#6B9E7A','#C4607A','#5B8DB8','#D4845A'];
function getColor(name){ return avatarColors[(name||'?').charCodeAt(0) % avatarColors.length]; }
function getInitials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

// Logo
const logoRef = doc(db,'settings','logo');
getDoc(logoRef).then(s=>{ if(s.exists()&&s.data().url) document.getElementById('logoImg').src=s.data().url; });

onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  currentUser = user;
  const mSnap = await getDoc(doc(db,'members',user.email));
  if(!mSnap.exists()){ window.location.href='login.html'; return; }
  currentMember = mSnap.data();
  const name = currentMember.name || user.email;
  document.getElementById('navName').textContent = name;
  const av = document.getElementById('navAvatar');
  av.textContent = getInitials(name);
  av.style.background = `linear-gradient(135deg,${getColor(name)},${getColor(name+'x')})`;
  const ra = document.getElementById('replyAvatar');
  ra.textContent = getInitials(name);
  ra.style.background = `linear-gradient(135deg,${getColor(name)},${getColor(name+'x')})`;
  document.getElementById('submitReply').disabled = false;
  loadQuestion();
});

async function loadQuestion(){
  const qSnap = await getDoc(doc(db,'settings','weeklyQuestion'));
  if(qSnap.exists()){
    const d = qSnap.data();
    currentQuestionId = d.id || 'default';
    document.getElementById('wqText').textContent = d.question || 'What is one English word you learned this week?';
    document.getElementById('wqMeta').textContent = d.date ? `Posted: ${d.date}` : '';
  } else {
    document.getElementById('wqText').textContent = 'What is one English word you learned this week?';
    currentQuestionId = 'default';
  }
  loadPosts();
}

function loadPosts(){
  const q = query(collection(db,'communityPosts'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const posts = [];
    snap.forEach(d => posts.push({id:d.id,...d.data()}));
    renderPosts(posts);
    document.getElementById('postsCount').textContent = `${posts.length} ${posts.length===1?'reply':'replies'}`;
  });
}

function renderPosts(posts){
  const list = document.getElementById('postsList');
  if(!posts.length){ list.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.9rem">No replies yet — be the first!</div>'; return; }
  list.innerHTML = posts.map(p => {
    const name = p.authorName || 'Member';
    const initials = getInitials(name);
    const color = getColor(name);
    const time = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const reactions = p.reactions || {};
    const reactionEmojis = ['👍','❤️','🔥','💡','😊'];
    const reactBtns = reactionEmojis.map(e => {
      const count = (reactions[e]||[]).length;
      const reacted = currentUser && (reactions[e]||[]).includes(currentUser.email);
      return `<button class="reaction-btn${reacted?' reacted':''}" onclick="toggleReaction('${p.id}','${e}')" title="${e}">
        <span class="r-emoji">${e}</span>${count>0?`<span>${count}</span>`:''}
      </button>`;
    }).join('');
    const replies = p.replies || [];
    const repliesHtml = replies.map(r => {
      const rn = r.authorName||'Member';
      return `<div class="nested-reply">
        <div class="nested-avatar" style="background:linear-gradient(135deg,${getColor(rn)},${getColor(rn+'x')})">${getInitials(rn)}</div>
        <div class="nested-body">
          <div class="nested-name">${rn}</div>
          <div class="nested-text">${r.text}</div>
          <div class="nested-time">${r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="post-card" id="post-${p.id}">
      <div class="post-header">
        <div class="post-avatar" style="background:linear-gradient(135deg,${color},${getColor(name+'x')})">${initials}</div>
        <div class="post-meta"><div class="post-name">${name}</div><div class="post-time">${time}</div></div>
      </div>
      <div class="post-text">${p.text}</div>
      <div class="reactions-row">
        ${reactBtns}
        <button class="reply-toggle" onclick="toggleReplies('${p.id}')">💬 ${replies.length||''} Reply</button>
      </div>
      <div class="nested-replies" id="replies-${p.id}">
        ${repliesHtml}
        <div class="nested-input-wrap">
          <div class="nested-avatar" style="background:linear-gradient(135deg,${getColor(currentMember?.name||'')},${getColor((currentMember?.name||'')+'x')})">${getInitials(currentMember?.name||'?')}</div>
          <input class="nested-input" id="nestedInput-${p.id}" placeholder="Write a reply...">
          <button class="btn-nested-send" onclick="sendNestedReply('${p.id}')">Send</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.toggleReaction = async (postId, emoji) => {
  if(!currentUser) return;
  const ref = doc(db,'communityPosts',postId);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  const reactions = snap.data().reactions || {};
  const arr = reactions[emoji] || [];
  if(arr.includes(currentUser.email)){
    await updateDoc(ref,{[`reactions.${emoji}`]: arrayRemove(currentUser.email)});
  } else {
    await updateDoc(ref,{[`reactions.${emoji}`]: arrayUnion(currentUser.email)});
  }
};

window.toggleReplies = (postId) => {
  const el = document.getElementById(`replies-${postId}`);
  el.classList.toggle('open');
};

window.sendNestedReply = async (postId) => {
  const input = document.getElementById(`nestedInput-${postId}`);
  const text = input.value.trim();
  if(!text || !currentUser) return;
  const ref = doc(db,'communityPosts',postId);
  await updateDoc(ref,{ replies: arrayUnion({
    text, authorName: currentMember?.name || currentUser.email,
    authorEmail: currentUser.email, createdAt: {seconds: Math.floor(Date.now()/1000)}
  })});
  input.value = '';
};

document.getElementById('replyInput').addEventListener('input', e => {
  document.getElementById('submitReply').disabled = !e.target.value.trim();
});

document.getElementById('submitReply').addEventListener('click', async () => {
  const text = document.getElementById('replyInput').value.trim();
  if(!text || !currentUser) return;
  const btn = document.getElementById('submitReply');
  btn.disabled = true; btn.textContent = 'Posting...';
  await addDoc(collection(db,'communityPosts'),{
    text, authorName: currentMember?.name || currentUser.email,
    authorEmail: currentUser.email, createdAt: serverTimestamp(),
    reactions:{}, replies:[], questionId: currentQuestionId
  });
  document.getElementById('replyInput').value = '';
  btn.textContent = 'Post Reply';
});
</script>
</body>
</html>
